services:
  clamav:
    image: clamav/clamav:latest
    container_name: metascan-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping=2 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metascan-backend
    restart: unless-stopped
    environment:
      - METASCAN_ANTIVIRUS_MODE=clamd
      - METASCAN_ANTIVIRUS_CLAMD_HOST=clamav
      - METASCAN_ANTIVIRUS_CLAMD_PORT=3310
    depends_on:
      clamav:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: metascan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  clamav-db:
