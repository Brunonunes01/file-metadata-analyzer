spring.application.name=metascan

# Limites basicos de upload multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Antivirus (modo local por padrao; no docker-compose usa clamd via rede interna)
metascan.antivirus.mode=${METASCAN_ANTIVIRUS_MODE:clamscan}
metascan.antivirus.clamd.host=${METASCAN_ANTIVIRUS_CLAMD_HOST:localhost}
metascan.antivirus.clamd.port=${METASCAN_ANTIVIRUS_CLAMD_PORT:3310}
